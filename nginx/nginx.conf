events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript
                  text/xml application/xml image/svg+xml;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────
    server {
        listen 80;
        server_name oila-ai.uz www.oila-ai.uz api.oila-ai.uz;
        return 301 https://$host$request_uri;
    }

    # ── www → без www ─────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name www.oila-ai.uz;

        ssl_certificate     /etc/letsencrypt/live/oila-ai.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/oila-ai.uz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        return 301 https://oila-ai.uz$request_uri;
    }

    # ── Фронтенд: oila-ai.uz ─────────────────────────────────────
    server {
        listen 443 ssl;
        server_name oila-ai.uz;

        ssl_certificate     /etc/letsencrypt/live/oila-ai.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/oila-ai.uz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;

        root  /usr/share/nginx/html;
        index index.html;

        # React SPA — всегда отдавать index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Статика фронтенда кешируется на год
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Бэкенд: api.oila-ai.uz ───────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.oila-ai.uz;

        ssl_certificate     /etc/letsencrypt/live/api.oila-ai.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.oila-ai.uz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;

        client_max_body_size 20M;

        # Django API
        location / {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Статика Django (admin и т.д.)
        location /static/ {
            alias   /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public";
        }
    }
}
